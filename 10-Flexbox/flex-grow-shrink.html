<!doctype html>
<html>
  <head>
    <title>Flex Grow & Shrink</title>
    <link rel="stylesheet" href="flexbox.css" />

    <style>
      .box:nth-child(1) {
        flex-grow: 1;
      }

      .box:nth-child(2) {
        flex-grow: 2;
      }

      .box:nth-child(3) {
        flex-grow: 3;
      }
    </style>
  </head>

  <body>
    <h2>Flex Grow</h2>

    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
    </div>
  </body>
</html>
