<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <h1>HTML Tables</h1>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Priyanka</td>
            <td>21</td>
            <td>Mumbai</td>
        </tr>
        <tr>
            <td>Khushi</td>
            <td>22</td>
            <td>Mulund</td>
        </tr>
    </table>
</body>
</html>
