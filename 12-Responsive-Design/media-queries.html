<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
        body {
            background-color: cadetblue;
        }

        @media(max-width: 600px){
            body {
                background-color: darkred;
            }
        }
    </style>
</head>
<body>
    <h2> Resize screen to see changes</h2>
</body>
</html>
